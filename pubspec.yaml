name: five_of_us
description: "Five of Us - Cute Social App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0

  # State Management
  provider: ^6.1.5

  # Routing
  go_router: ^16.0.0

  # SVG
  flutter_svg: ^2.2.0

  # Animation
  lottie: ^3.3.1

  # Fonts
  google_fonts: ^6.3.0

  # Icons
  iconsax_flutter: ^1.0.1

  # Image Cache
  cached_network_image: ^3.4.1

  # Local Storage
  shared_preferences: ^2.5.3

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animals/
    - assets/animations/